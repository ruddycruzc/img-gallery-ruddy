<div
  class="flex h-full flex-col overflow-hidden rounded-2xl border bg-white shadow-md transition-all duration-500 ease-in-out hover:shadow-2xl"
  [class.border-purple-500]="isFeatured()"
  [class.ring-4]="isFeatured()"
  [class.ring-purple-600]="isFeatured()"
  [class.scale-100]="isFeatured()"
  [class.z-10]="isFeatured()">
  <img
    [src]="image().image"
    alt="{{ image().alt }}"
    title="{{ image().alt }}"
    class="w-full flex-1 object-cover transition-transform duration-500 hover:scale-110"
    [class.h-full]="isFeatured()"
    [class.h-52]="!isFeatured()"
  />

  <div class="p-4">
    <h2 class="text-lg font-semibold text-gray-800">
      {{ image().fullName }}
    </h2>
  </div>
<button
  type="button"
  title="Delete image"
  (click)="onDeleteClick($event)"
  class="rounded-lg bg-red-500 px-15 py-2 text-white transition hover:bg-red-700"
>
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16" aria-hidden="true">
  <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
  <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
</svg>
</button>
  
</div>
