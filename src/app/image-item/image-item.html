<div
  class="overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-md transition duration-300 hover:scale-105 hover:shadow-xl"
>
  <img
    [src]="image().image"
    [alt]="image().alt"
    class="h-72 w-full object-cover"
  />

  <div class="p-4">
    <h2 class="text-lg font-semibold text-gray-800">
      {{ image().fullName }}
    </h2>
  </div>
</div>
