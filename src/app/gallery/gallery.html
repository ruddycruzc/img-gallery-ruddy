<div class="grid auto-rows-[300px] grid-cols-1 gap-6 p-6 sm:grid-cols-2 md:grid-cols-4">
  @for (image of images(); track image.id; let first = $first) {
    <div [class.row-span-3]="first">
      <app-image-item
        [image]="image"
        [isFeatured]="image.id === featuredImageId()"
        (deleteImage)="removeImage($event)"
      ></app-image-item>
    </div>
  }
</div>
